name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Install prettier
        run: npm install -g prettier

      - name: Install vale
        run: |
          wget -q https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz
          tar -xzf vale_3.9.0_Linux_64-bit.tar.gz vale
          sudo mv vale /usr/local/bin/
          vale sync

      - name: Run markdownlint and vale
        run: |
          markdownlint src/content/docs/**/*.md CLAUDE.md README.md
          vale src/content/docs/how/*.md src/content/docs/why/*.md src/content/docs/learn/*.md CLAUDE.md

      - name: Verify cross-references and counts
        run: |
          make check-refs
          make check-counts

      - name: Check formatting
        run: make check

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline src/content/docs/**/*.md CLAUDE.md README.md

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        if: github.event_name == 'schedule'
        with:
          args: src/content/docs/**/*.md CLAUDE.md README.md

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
